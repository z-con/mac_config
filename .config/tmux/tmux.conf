set -g prefix C-Space
bind C-b send-prefix
bind q source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ── Vi copy mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Splits ─────────────────────────────────────────────────────────────────────
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind x kill-pane

# ── Pane navigation ────────────────────────────────────────────────────────────
bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

# ── Pane resize ────────────────────────────────────────────────────────────────
bind -n C-M-S-Left  resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up    resize-pane -U 5
bind -n C-M-S-Down  resize-pane -D 5

# ── Windows ────────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind r command-prompt "rename-window '%%'"
bind k kill-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n M-S-Left swap-window -t -1 \; previous-window
bind -n M-S-Right swap-window -t +1 \; next-window

# ── Sessions ───────────────────────────────────────────────────────────────────
bind R command-prompt "rename-session '%%'"
bind C new-session
bind K kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left  "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6e3a1] %H:%M  %d %b "
setw -g window-status-current-style "fg=#cba6f7,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

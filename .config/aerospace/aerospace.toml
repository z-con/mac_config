start-at-login = true

# Mouse warps to focused window center (only if already outside it)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# Uncomment to have mouse follow every focus change:
# on-focus-changed = ['move-mouse window-lazy-center']

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

# Workspaces 1–5 on primary monitor, 6–10 on secondary.
# Falls back to primary if only one monitor is connected.
[workspace-to-monitor-force-assignment]
1  = 1
2  = 1
3  = 1
4  = 1
5  = 1
6  = 2
7  = 2
8  = 2
9  = 2
10 = 2

[mode.main.binding]
# ── Focus ──────────────────────────────────────────────────────────────────────
alt-h     = 'focus left'
alt-j     = 'focus down'
alt-k     = 'focus up'
alt-l     = 'focus right'
alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# ── Move ───────────────────────────────────────────────────────────────────────
alt-shift-h     = 'move left'
alt-shift-j     = 'move down'
alt-shift-k     = 'move up'
alt-shift-l     = 'move right'
alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# ── Resize (mirrors Super+Ctrl+Arrows from Hyprland) ───────────────────────────
alt-ctrl-left  = 'resize width -50'
alt-ctrl-right = 'resize width +50'
alt-ctrl-up    = 'resize height +50'
alt-ctrl-down  = 'resize height -50'

# ── Layout ─────────────────────────────────────────────────────────────────────
alt-slash       = 'layout tiles horizontal vertical'
alt-comma       = 'layout accordion horizontal vertical'
alt-f           = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# ── Workspaces ─────────────────────────────────────────────────────────────────
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# ── Move window to workspace ───────────────────────────────────────────────────
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# ── Sequential workspace navigation — no wrap (mirrors workspace-scroll.sh) ────
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'workspace next'
alt-ctrl-tab  = 'workspace prev'

# ── System ─────────────────────────────────────────────────────────────────────
alt-shift-r         = 'reload-config'
alt-shift-q         = 'close'
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc         = ['reload-config', 'mode main']
r           = ['flatten-workspace-tree', 'mode main']
f           = ['layout floating tiling', 'mode main']
backspace   = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
